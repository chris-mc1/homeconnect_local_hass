rules:
  # Bronze
  action-setup: done
  appropriate-polling:
    status: exempt
    comment: |
      This integration is push-based.
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup:
    status: exempt
    comment: |
      Setup always succeeds and entities are created from the appliance profile
      cached in the config entry, even if the appliance is unreachable. This is
      intentional: appliances of any type can have temporary, recoverable
      outages (e.g. a stuck local websocket, a brief network blip), and
      raising ConfigEntryNotReady on a connection failure would tear down the
      whole config entry and create no entities at all until it reconnects,
      instead of letting the user see which entities/appliance are affected.
      Instead, entities are marked unavailable in real time based on the live
      websocket connection state (see entity-unavailable) and automatically
      become available again once the appliance responds to a heartbeat. A
      repair issue is also raised after a sustained outage (see
      repair-issues). This was a deliberate design choice made after user
      complaints (issues #274 and #293) about the previous
      ConfigEntryNotReady-based behavior, which mainly affected washers/dryers
      that legitimately power off and disconnect their own WiFi between
      cycles. Connect failures and the repair issue are also suppressed for
      those appliance types specifically (Washer/Dryer/WasherDryer), since for
      them being offline isn't just recoverable, it's expected; for every
      other appliance type, an outage is still surfaced via entity
      unavailability and the repair issue, just without blocking setup.
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: |
      The integration does not have configuration options.
  docs-installation-parameters: done
  entity-unavailable: 
    status: done
    comment: |
      Heartbeat signals are sent to the device every 30 seconds 
      and if the device doesn't respond it's entites are marked 
      as unavailable
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info: done
  discovery: done
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: |
      This integration only supports one device per config entry, so dynamic devices are not applicable.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow:
    status: exempt
    comment: |
      No need for reconfiguration flow.
  repair-issues: done
  stale-devices:
    status: exempt
    comment: |
      This integration only supports one device per config entry, so stale devices are not applicable.

  # Platinum
  async-dependency: done
  inject-websession: todo
  strict-typing: todo
